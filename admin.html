<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norröna Admin - CYBER CONTROL</title>
    
    <link href="https://unpkg.com/material-icons@1.13.12/iconfont/material-icons.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --primary-navy: #00121a; 
            --led-green: #00ff88;
            --accent-gold: #fbb900; 
            --bg-dark: #000b11;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #e2e8f0; 
            --danger: #ff3333; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', 'Courier New', monospace; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-light); 
            display: flex; height: 100vh; overflow: hidden; 
        }

        aside { 
            width: 280px; background: #001a24; border-right: 1px solid var(--led-green); 
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,255,136,0.05);
        }
        .sidebar-header { 
            padding: 25px; border-bottom: 1px solid var(--glass-border); 
            color: var(--led-green); font-weight: bold; text-shadow: 0 0 10px var(--led-green);
        }

        .nav-item { 
            padding: 15px 25px; display: flex; align-items: center; gap: 12px; 
            color: var(--text-light); cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover { background: rgba(0, 255, 136, 0.1); color: var(--led-green); }
        .nav-item.active { border-left: 4px solid var(--led-green); background: rgba(0, 255, 136, 0.05); color: var(--led-green); }

        main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #001a24 0%, #000b11 100%); }
        header { 
            height: 70px; border-bottom: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px; 
        }

        .content-area { padding: 30px; overflow-y: auto; }
        .card { 
            background: var(--glass); backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); border-radius: 15px; 
            padding: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* MODERATION BOXES */
        .mess-mod-post { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            border-radius: 10px; padding: 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .mess-mod-name { color: var(--accent-gold); font-weight: bold; margin-bottom: 5px; }
        
        .btn-primary { 
            background: var(--led-green); color: #000; border-radius: 5px; 
            padding: 10px 20px; font-weight: bold; cursor: pointer; border: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .btn-danger { background: var(--danger); color: #fff; border-radius: 5px; cursor: pointer; border: none; padding: 8px 15px; }

        input, textarea, select { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            color: #fff; padding: 12px; border-radius: 5px; width: 100%; margin-top: 5px;
        }
        
        .toast { 
            position: fixed; bottom: 30px; right: 30px; background: var(--led-green); 
            color: #000; padding: 15px 30px; border-radius: 5px; font-weight: bold; 
            opacity: 0; transition: 0.3s; 
        }
        .toast.show { opacity: 1; transform: translateY(-20px); }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">SYSTEM ADMIN v2.6</div>
        <div class="nav-group">
            <div class="nav-item active" onclick="loadEditor('mess', 'moderate', this)"><span class="material-icons">security</span> MODERATION</div>
            <div class="nav-item" onclick="loadEditor('ai', 'knowledge', this)"><span class="material-icons">psychology</span> AI CORE</div>
            <div class="nav-item" onclick="loadEditor('handbook', 'general', this)"><span class="material-icons">terminal</span> HANDBOOK</div>
        </div>
    </aside>

    <main>
        <header>
            <h2 id="header-title" style="color:var(--led-green)">DASHBOARD</h2>
            <button class="btn-primary" onclick="saveToFirebase()">EXECUTE SYNC</button>
        </header>
        <div class="content-area" id="editor-container"></div>
    </main>

    <div class="toast" id="toast">SYSTEM UPDATED</div>

<script>
    var p1 = "AIzaS"; var p2 = "yD1C2q"; var p3 = "R2CR5L"; var p4 = "PA2tps"; var p5 = "8b9_cO"; var p6 = "9WNt13"; var p7 = "iDqc";
    var firebaseConfig = { apiKey: p1+p2+p3+p4+p5+p6+p7, authDomain: "norrona-app.firebaseapp.com", databaseURL: "https://norrona-app-default-rtdb.europe-west1.firebasedatabase.app", projectId: "norrona-app", storageBucket: "norrona-app.firebasestorage.app", messagingSenderId: "836610543277", appId: "1:836610543277:web:3e74479daf205453bd0024" };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var crewMessPosts = [];
    db.ref('crew_mess').on('value', function(snapshot) {
        crewMessPosts = [];
        snapshot.forEach(c => { var d = c.val(); d.id = c.key; crewMessPosts.push(d); });
        if(currentEditorType === 'mess') renderMessModeration();
    });

    var currentEditorType = 'mess';
    function loadEditor(type, key, el) {
        currentEditorType = type;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('header-title').innerText = type.toUpperCase();
        
        var container = document.getElementById('editor-container');
        if(type === 'mess') renderMessModeration();
        else container.innerHTML = `<div class="card">Core editor for ${type} is ready.</div>`;
    }

    function renderMessModeration() {
        var container = document.getElementById('editor-container');
        var html = `<h3>LIVE FEED MODERATION</h3><p style="margin-bottom:20px; opacity:0.6;">Delete unauthorized posts instantly.</p>`;
        crewMessPosts.reverse().forEach(p => {
            html += `<div class="mess-mod-post">
                <div>
                    <div class="mess-mod-name">${p.name}</div>
                    <div style="font-size:0.9rem;">${p.message}</div>
                </div>
                <button class="btn-danger" onclick="deletePost('${p.id}')">PURGE</button>
            </div>`;
        });
        container.innerHTML = html;
    }

    function deletePost(id) {
        if(confirm("Confirm deletion?")) {
            db.ref('crew_mess/'+id).remove().then(() => showToast());
        }
    }

    function showToast() { 
        var t = document.getElementById('toast'); t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 2000); 
    }

    window.onload = () => loadEditor('mess', 'moderate', document.querySelector('.nav-item'));
</script>
</body>
</html>
